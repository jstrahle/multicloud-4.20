clusterGroup:
  name: hub      #  namespace bliver til validated Pattern navn  + dette navn  -->   ose-gitops-hub namespace  som er dette clusters apps ex propropro mm    (  openshift-gitops namespace indeholder ose-gitops-hub argo app)
  isHubCluster: true
  namespaces:
    - ack-system
    - open-cluster-management
    - hello-world
    - openshift-opentelemetry-operator:
        operatorGroup: true
        targetNamespaces:
    - openshift-adp:
        operatorGroup: true
        targetNamespaces:
          - openshift-adp
    - openshift-logging:
        operatorGroup: true
        targetNamespaces:

  # Ways to  find subscription names :
  # You can install the operator from the console and then check the subscription/csv of it to determine the correct values
  # You can search for the operator name with the command (in this example I'm search for operator with the name efs in it's name):
  #    oc get packagemanifests -o custom-columns=NAME:.metadata.name | grep efs
  #    and then find the other values with the command oc get packagemanifests aws-efs-csi-driver-operator -o yaml
  subscriptions:
    acm:
      name: advanced-cluster-management
      namespace: open-cluster-management
      channel: release-2.13
      #csv: advanced-cluster-management.v2.6.1
    opentelemetry:   #tip: manually install first, and then search "sub" and find the data in yaml
      channel: stable
      installPlanApproval: Automatic
      name: opentelemetry-product
      namespace: openshift-opentelemetry-operator
      source: redhat-operators
      sourceNamespace: openshift-marketplace
      startingCSV: opentelemetry-operator.v0.127.0-1
    oadp:
      name: redhat-oadp-operator
      namespace: openshift-adp
      source: redhat-operators
      sourceNamespace: openshift-marketplace
      channel: stable
      startingCSV: oadp-operator.v1.5.4
    s3:
      channel: alpha
      installPlanApproval: Automatic
      namespace: ack-system
      name: ack-s3-controller
      source: community-operators
      sourceNamespace: openshift-marketplace
      startingCSV: ack-s3-controller.v1.0.33
    logging:
      channel: stable-6.4
      installPlanApproval: Automatic
      namespace: openshift-logging
      name: cluster-logging
      source: redhat-operators
      sourceNamespace: openshift-marketplace
      startingCSV: cluster-logging.v6.4.2
  #argoCD:
  #  resourceExclusions: |
  #    - apiGroups:
  #      - tekton.dev
  #      kinds:
  #      - TaskRun
  #      - PipelineRun
  #    - apiGroups:
  #      - policy.open-cluster-management.io
  #      kinds:
  #      - Policy
  #      namespaces:
  #      - bd-ose-microservices-p1
  #      clusters:
  #      - "*"

  projects:
    - hub
    - hello-world
    - management-p1
  # Explicitly mention the cluster-state based overrides we plan to use for this pattern.
  # We can use self-referential variables because the chart calls the tpl function with these variables defined
  sharedValueFiles:
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
  # sharedValueFiles is a flexible mechanism that will add the listed valuefiles to every app defined in the
  # applications section. We intend this to supplement and possibly even replace previous "magic" mechanisms, though
  # we do not at present have a target date for removal.
  #
  # To replicate the "classic" magic include structure, the clusterGroup would need all of these
  # sharedValueFiles, in this order:
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}-{{ $.Values.global.clusterVersion }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}-{{ $.Values.clusterGroup.name }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml"
  #   - '/overrides/values-{{ $.Values.global.localClusterName }}.yaml'

  # This kind of variable substitution will work with any of the variables the Validated Patterns operator knows
  # about and sets, so this is also possible, for example:
  #   - '/overrides/values-{{ $.Values.global.hubClusterDomain }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.localClusterDomain }}.yaml'
  applications:
    acm:
      name: acm
      namespace: open-cluster-management
      project: hub
      chart: acm          #   https://charts.validatedpatterns.io/acm
      chartVersion: 0.1.*
      syncPolicy:
        automated:
          prune: false
          selfHeal: false
      ignoreDifferences:
        - group: internal.open-cluster-management.io
          kind: ManagedClusterInfo
          jsonPointers:
            - /spec/loggingCA

  #
    general-configs:
      project: hub
      name: general-configs
      kustomize: true
      path: charts/hub/general-configs/base
      syncPolicy:
        automated:
          prune: false
          selfHeal: false

    hello-world:
      name: hello-world
      namespace: hello-world
      project: hello-world
      path: charts/all/hello-world
      syncPolicy:
        automated:
          prune: false
          selfHeal: false

  #imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
